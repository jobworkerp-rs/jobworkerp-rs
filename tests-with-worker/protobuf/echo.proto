syntax = "proto3";

// Minimal echo service used by the call.grpc integration test. The test starts
// a reflection-enabled server so the GRPC runner can convert a JSON request body
// to protobuf and the JSON response back, exercising the full call.grpc path.
package echo;

message EchoRequest {
  string message = 1;
}

message EchoReply {
  string message = 1;
}

service EchoService {
  rpc Echo(EchoRequest) returns (EchoReply);
}
