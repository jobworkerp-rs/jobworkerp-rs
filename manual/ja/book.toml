[book]
title = "jobworkerp-rs ドキュメント"
description = "Rustで実装されたスケーラブルなジョブワーカーシステム"
authors = ["jobworkerp-rs contributors"]
language = "ja"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
site-url = "/jobworkerp-rs/ja/"
edit-url-template = "https://github.com/jobworkerp-rs/jobworkerp-rs/edit/main/manual/ja/src/{path}"
git-repository-url = "https://github.com/jobworkerp-rs/jobworkerp-rs"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
editable = false
