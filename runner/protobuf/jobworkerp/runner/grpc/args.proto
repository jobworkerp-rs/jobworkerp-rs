syntax = "proto3";
package jobworkerp.runner.grpc;

// Structurally identical to GrpcSettingsProtoSource in runner.proto.
// The separate name avoids same-package message collisions.
message GrpcArgsProtoSource {
  // # Source
  // Proto location: an https://, http://, file:// URI, or inline proto text.
  string source = 1;

  // # Fetch Headers
  // HTTP headers sent when fetching source over HTTP(S).
  map<string, string> fetch_headers = 2;

  // # Allow Insecure HTTP
  // Allow non-TLS http:// fetches. Defaults to false.
  optional bool allow_insecure_http = 3;
}

// # GrpcArgs
// Arguments for gRPC calls (shared by unary and streaming methods).
// Encapsulates all necessary information to make a gRPC call.
message GrpcArgs {
  // # Method
  // Full method name in format "service/method" that identifies the gRPC endpoint.
  // Optional when GrpcRunnerSettings.method is set (settings takes priority).
  optional string method = 1;

  // # Request
  // Request payload: either raw protobuf binary or JSON string.
  oneof request {
    // Raw protobuf binary (non-reflection mode).
    // Must be a pre-serialized protobuf message.
    bytes body = 2;

    // JSON string (reflection mode).
    // Will be converted to protobuf message by the runner using reflection.
    string json_body = 3;
  }

  // # Metadata
  // Request metadata as key-value pairs to be sent with the gRPC call
  map<string, string> metadata = 4;

  // # Timeout
  // Maximum time in milliseconds to wait for the request to complete.
  // 0 or unset means no timeout (wait indefinitely).
  // Optional when GrpcRunnerSettings.timeout is set (settings takes priority).
  optional uint32 timeout = 5;

  // # AsJson
  // When true, convert response body from binary protobuf to JSON using reflection or proto descriptor.
  // Optional when GrpcRunnerSettings.as_json is set (settings takes priority).
  optional bool as_json = 6;

  // # Proto Source
  // Per-request descriptor source used when GrpcRunnerSettings.proto is unset.
  optional GrpcArgsProtoSource proto = 7;
}
