syntax = "proto3";
package jobworkerp.runner.grpc;

// # GrpcUnaryResult
// Response from a gRPC unary call.
// Contains all information returned from a completed gRPC unary call.
message GrpcUnaryResult {
    // # Metadata
    // Initial metadata (headers) received from the gRPC response
    map<string, string> metadata = 1;

    // # Code
    // gRPC status code (0 = OK, other values indicate errors)
    // See: https://grpc.github.io/grpc/core/md_doc_statuscodes.html
    int32 code = 2;

    // # Message
    // Error message describing the result
    optional string message = 3;

    // # ResponseData
    // Response payload: either binary protobuf or JSON string (mutually exclusive)
    oneof response_data {
        // Binary-encoded response message (default, or fallback when JSON conversion fails)
        bytes body = 4;
        // JSON-formatted response body (when as_json=true and reflection is available)
        string json_body = 5;
    }
}
