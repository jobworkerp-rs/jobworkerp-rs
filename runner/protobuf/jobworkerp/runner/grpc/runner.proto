syntax = "proto3";
package jobworkerp.runner.grpc;

// Proto descriptor source for JSON<->protobuf conversion without reflection.
// Keep this structurally identical to GrpcArgsProtoSource in args.proto.
message GrpcSettingsProtoSource {
    // # Source
    // Proto location: an https://, http://, file:// URI, or inline proto text.
    string source = 1;

    // # Fetch Headers
    // HTTP headers sent when fetching source over HTTP(S).
    map<string, string> fetch_headers = 2;

    // # Allow Insecure HTTP
    // Allow non-TLS http:// fetches. Defaults to false.
    optional bool allow_insecure_http = 3;
}

// Configuration for gRPC runner connections (shared by unary and streaming methods)
message GrpcRunnerSettings {
    // TLS configuration settings for secure connections
    message TlsConfig {
        // # CA Certificate Path
        // Path to CA certificate for verifying server
        string ca_cert_path = 1;

        // # Client Certificate Path
        // Path to client certificate (for mutual TLS)
        string client_cert_path = 2;

        // # Client Key Path
        // Path to client private key (for mutual TLS)
        string client_key_path = 3;

        // # Server Name Override
        // Server name to use for verification (if different from host)
        string server_name_override = 4;
    }
    // # Host
    // Host address of the gRPC server (hostname or IP)
    string host = 1;

    // # Port
    // Port number of the gRPC server
    uint32 port = 2;

    // # TLS Enabled
    // Whether to use TLS encryption for the connection
    bool tls = 3;

    // # Connection Timeout
    // Connection timeout in milliseconds (used when establishing the gRPC channel)
    optional uint32 connection_timeout = 4;

    // # Max Message Size
    // Maximum message size in bytes (0 for default)
    optional uint32 max_message_size = 5;

    // # Authentication Token
    // Authentication token or API key (if required)
    optional string auth_token = 6;

    // # TLS Configuration
    // TLS configuration options (relevant when tls=true)
    optional TlsConfig tls_config = 7;

    // # Use Reflection
    // Whether to use gRPC reflection API for dynamic message construction
    optional bool use_reflection = 8;

    // # Default Method
    // Default gRPC method in "service/method" format.
    // When set, this takes priority over method specified in GrpcArgs.
    optional string method = 9;

    // # Default Metadata
    // Default request metadata as key-value pairs.
    // Merged with GrpcArgs metadata; settings keys take priority over args keys.
    map<string, string> metadata = 10;

    // # Default Timeout
    // Default per-request timeout in milliseconds.
    // 0 means no timeout (wait indefinitely).
    // When set, this takes priority over timeout specified in GrpcArgs.
    // This is distinct from connection_timeout (field 4) which controls channel establishment.
    optional uint32 timeout = 11;

    // # Default AsJson
    // Default value for converting response to JSON using reflection or proto descriptor.
    // When set, this takes priority over as_json specified in GrpcArgs.
    optional bool as_json = 12;

    // # Proto Source
    // Descriptor source used instead of server reflection.
    // When set, this takes priority over proto specified in GrpcArgs.
    optional GrpcSettingsProtoSource proto = 13;
}
