syntax = "proto3";
package jobworkerp.runner.grpc;

// Configuration for gRPC runner connections (shared by unary and streaming methods)
message GrpcRunnerSettings {
    // TLS configuration settings for secure connections
    message TlsConfig {
        // # CA Certificate Path
        // Path to CA certificate for verifying server
        string ca_cert_path = 1;

        // # Client Certificate Path
        // Path to client certificate (for mutual TLS)
        string client_cert_path = 2;

        // # Client Key Path
        // Path to client private key (for mutual TLS)
        string client_key_path = 3;

        // # Server Name Override
        // Server name to use for verification (if different from host)
        string server_name_override = 4;
    }
    // # Host
    // Host address of the gRPC server (hostname or IP)
    string host = 1;

    // # Port
    // Port number of the gRPC server
    uint32 port = 2;

    // # TLS Enabled
    // Whether to use TLS encryption for the connection
    bool tls = 3;

    // # Timeout
    // Connection timeout in milliseconds
    optional uint32 timeout_ms = 4;

    // # Max Message Size
    // Maximum message size in bytes (0 for default)
    optional uint32 max_message_size = 5;

    // # Authentication Token
    // Authentication token or API key (if required)
    optional string auth_token = 6;

    // # TLS Configuration
    // TLS configuration options (relevant when tls=true)
    optional TlsConfig tls_config = 7;

    // # Use Reflection
    // Whether to use gRPC reflection API for dynamic message construction
    optional bool use_reflection = 8;

    // # Default Method
    // Default gRPC method in "service/method" format.
    // When set, this takes priority over method specified in GrpcArgs.
    optional string method = 9;

    // # Default Metadata
    // Default request metadata as key-value pairs.
    // When non-empty, this takes priority over metadata specified in GrpcArgs.
    map<string, string> metadata = 10;

    // # Default Timeout
    // Default request timeout in milliseconds.
    // When set, this takes priority over timeout specified in GrpcArgs.
    optional int64 timeout = 11;

    // # Default AsJson
    // Default value for converting response to JSON using reflection.
    // When set, this takes priority over as_json specified in GrpcArgs.
    optional bool as_json = 12;
}
